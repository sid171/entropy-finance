name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff>=0.4.0

      - name: Run ruff
        # E501 – line too long (Streamlit UIs have long strings)
        # E701 – multiple statements on one line (guard-clause style in app.py)
        # W291/W293 – trailing whitespace
        run: ruff check . --select E,F,W --ignore E501,E701,W291,W293

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify imports
        run: |
          python -c "from entropy_tools import shannon_entropy, transfer_entropy, rolling_entropy, detect_regimes, correlation_stability, adaptive_te_bins; print('entropy_tools OK')"
          python -c "from entropy_calibration import normalize_shannon_entropy, normalize_transfer_entropy, normalize_changepoint_count, normalize_correlation_stress; print('entropy_calibration OK')"
          python -c "from valuation import entropy_adjusted_wacc, compute_dcf, monte_carlo_dcf, _estimate_wacc_std; print('valuation OK')"
          python -c "from backtest import backtest_entropy_signals; print('backtest OK')"
          python -c "from heatmap import compute_sector_heatmap; print('heatmap OK')"
          python -c "from market_data import get_returns, get_multiple_returns; print('market_data OK')"
          python -c "from config import SYSTEM_PROMPT, TOOL_DEFINITIONS; print('config OK')"

      - name: Run tests with coverage (enforced modules)
        run: |
          # Enforce 90% threshold on pure-logic modules that are fully
          # unit-testable without live network calls:
          #   entropy_tools (94%), entropy_calibration (100%), backtest (98%)
          python -m pytest tests/ -v \
            --cov=entropy_tools \
            --cov=entropy_calibration \
            --cov=backtest \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=90

      - name: Report coverage (all modules)
        run: |
          # Report-only step for valuation.py and market_data.py.
          # These modules are dominated by yfinance-dependent code that
          # requires network access; their pure-logic paths are tested above.
          python -m pytest tests/ -q \
            --cov=entropy_tools \
            --cov=entropy_calibration \
            --cov=backtest \
            --cov=valuation \
            --cov=market_data \
            --cov-report=term-missing \
            --no-header 2>&1 || true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report-py${{ matrix.python-version }}
          path: coverage.xml
